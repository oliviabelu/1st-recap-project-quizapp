<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="icon" href="./pics/witch.png" type="image/jpg" />
    <script src="js/form.js" defer></script>
    <title>Add new Question</title>
  </head>
  <body>
    <header class="my-header">
      <h1 class="my-header__title">Harry Potter Quiz</h1>
    </header>
    <main class="my-main" data-js="main">
      <form class="card new-card" data-js="form">
        <label for="question" class="new-card-header">Your Question</label>
        <textarea
          data-js="question"
          id="question"
          name="question"
          class="form-text card__question"
          maxlength="150"
          rows="5"
          cols="15"
        ></textarea>
        <p class="remaining-character">
          <span data-js="rem-char-quest">150</span> characters left
        </p>

        <label for="answer" class="new-card-header">Your Answer</label>
        <textarea
          data-js="answer"
          id="answer"
          name="answer"
          class="form-text card__answer"
          maxlength="150"
          cols="30"
        ></textarea>
        <p class="remaining-character">
          <span data-js="rem-char-ans">150</span> characters left
        </p>

        <label for="tag" class="new-card-header">Tag</label>
        <input type="text" name="tag" id="tag" class="card__tag" />

        <button type="submit" class="card__show-answer">Submit</button>
      </form>
    </main>
  </body>
  <footer>
    <nav class="navbar">
      <!-- <a class="navbar__icon" href="#home"><img src="./pics/home.png" /></a>
        <a class="navbar__icon" href="#bookmark">bookmark</a>
        <a class="navbar__icon" href="#profile">profile</a> -->
      <ul class="navbar__list">
        <li class="navbar__item">
          <a href="index.html" class="navbar__icon">
            <img
              src="./pics/home.png"
              alt="Home Icon"
              width="40vd"
              aria-describedby="Navigation to Homepage"
            />
          </a>
        </li>
        <li class="navbar__item">
          <a href="bookmark.html" class="navbar__icon">
            <img
              src="./pics/bookmark-fav.png"
              alt="Bookmark Icon"
              width="40vd"
              aria-describedby="Navigation to Bookmark page"
            />
          </a>
        </li>
        <li class="navbar__item navbar__item--active">
          <a href="form.html" class="navbar__icon">
            <img
              src="./pics/add-question.png"
              alt="Create new card Icon"
              width="40vd"
              aria-describedby="Navigation to page for Creating new cards"
            />
          </a>
        </li>
        <li class="navbar__item">
          <a href="profile.html" class="navbar__icon">
            <img
              src="./pics/witch.png"
              alt="Profile Icon"
              width="40vd"
              aria-describedby="Navigation to Profile page"
            />
          </a>
        </li>
      </ul>
    </nav>
  </footer>
</html>
