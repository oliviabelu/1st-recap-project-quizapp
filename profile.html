<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="icon" href="./pics/witch.png" type="image/jpg" />
    <script src="js/profile.js" defer></script>
    <title>Profile</title>
  </head>
  <body>
    <header class="my-header">
      <h1 class="my-header__title">Harry Potter Quiz</h1>
    </header>
    <main class="my-main" data-js="main">
      <section class="about-me">
        <div class="about-me__top" aria-describedby="profile picture and name">
          <img
            src="./pics/profile-witch.png"
            alt="my profile pic"
            width="100vw"
            class="about-me__profile-pic"
            aria-describedby="Profilepicture of a witch"
          />
          <p class="about-me__name" aria-describedby="profile name">
            Little Witch
          </p>
        </div>
        <p class="about-me__text">
          Hi there, <br />
          I'm new here and very interested in this cool quiz. <br />
          I already tried some questions! Check out my scores.
          <br />Let's be friends.
        </p>
        <div class="about-me__buttons">
          <button
            type="button"
            class="about-me__quest-but"
            aria-describedby="button that shows how many questions
          you already answered"
          >
            <img
              src="./pics/question.png"
              alt="questionsmark symbol"
              width="30vw"
            />
            13
          </button>
          <button
            type="button"
            class="about-me__bookmrk-but"
            aria-describedby="button that shows how many bookmarks
          you have"
          >
            <img
              src="./pics/bookmark-checked.png"
              alt="bookmark symbol"
              width="30vw"
            />
            3
          </button>
        </div>

        <h2>Settings</h2>
        <!-- <div class="set-darkmode">
          <p class="set-darkmode__text">darkmode</p>
          <input type="checkbox" id="darkmode-toggle" class="darkmode-toggle__input" />
          <label for="darkmode-toggle" class="darkmode-toggle__label"></label>
        </div> -->
        <div class="set-darkmode">
          <p class="set-darkmode__text">darkmode</p>
          <label for="darkmode-toggle" class="darkmode-toggle__label"></label>
          <input
            type="checkbox"
            id="darkmode-toggle"
            data-js="darkmode-toggle"
          />
        </div>
      </section>
    </main>
  </body>
  <footer>
    <nav class="navbar">
      <!-- <a class="navbar__icon" href="#home"><img src="./pics/home.png" /></a>
        <a class="navbar__icon" href="#bookmark">bookmark</a>
        <a class="navbar__icon" href="#profile">profile</a> -->
      <ul class="navbar__list">
        <li class="navbar__item">
          <a href="index.html" class="navbar__icon">
            <img
              src="./pics/home.png"
              alt="Home Icon"
              width="40vd"
              aria-describedby="Navigation to Homepage"
            />
          </a>
        </li>
        <li class="navbar__item">
          <a href="bookmark.html" class="navbar__icon">
            <img
              src="./pics/bookmark-fav.png"
              alt="Bookmark Icon"
              width="40vd"
              aria-describedby="Navigation to Bookmark page"
            />
          </a>
        </li>
        <li class="navbar__item">
          <a href="form.html" class="navbar__icon">
            <img
              src="./pics/add-question.png"
              alt="Create new card Icon"
              width="40vd"
              aria-describedby="Navigation to page for Creating new cards"
            />
          </a>
        </li>
        <li class="navbar__item navbar__item--active">
          <a href="profile.html" class="navbar__icon">
            <img
              src="./pics/witch.png"
              alt="Profile Icon"
              width="40vd"
              aria-describedby="Navigation to Profile page"
            />
          </a>
        </li>
      </ul>
    </nav>
  </footer>
</html>
