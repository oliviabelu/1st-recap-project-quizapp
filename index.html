<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>My Quiz</title>
  </head>
  <body>
    <header>
      <h1>My Quiz</h1>
    </header>
    <nav class="navbar">
      <ul class="navbar__list">
        <li class="navbar__item navbar__item--home">
          <a href="#home" class="navbar__icon"></a>
        </li>
        <li class="navbar__item navbar__item--bookmark">
          <a href="#bookmark" class="navbar__icon"></a>
        </li>
        <li class="navbar__item navbar__item--profile">
          <a href="#profile" class="navbar__icon"></a>
        </li>
      </ul>
    </nav>
    <main>
      <section class="card">
        <!--Question-->
        <p class="card__question">
          What is the name of the school that Harry Potter attends?
        </p>
        <!--Answer (hidden option)-->
        <p class="card__answer">Hogwarts School of Witchcraft and Wizardry</p>
        <!--Button: Show Answer / Hide Answer-->
        <button class="card__show-answer"></button>
        <!--Button: Bookmark-->
        <button class="card__bookmark"></button>
        <!--categories as tags-->
        <p class="tag-1">Harry Potter</p>
        <p class="tag-2">Hogwarts</p>
        <p class="tag-3">Fiction</p>
      </section>
    </main>
  </body>
</html>
